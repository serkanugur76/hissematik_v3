<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HisseMatik Pro | Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7fa; --card: #ffffff; --dark: #1a1d21; --primary: #0d6efd; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #2d3436; }
        .navbar { background-color: var(--dark) !important; border-bottom: 3px solid var(--primary); }
        .stock-card { border: none; border-radius: 16px; transition: all 0.3s ease; background: var(--card); }
        .stock-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .indicator-badge { background: #f8f9fb; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #eee; }
        .ai-box { background: var(--dark); color: #adbac7; border-radius: 12px; padding: 15px; border-left: 5px solid var(--primary); }
        .signal-badge { font-size: 0.8rem; padding: 6px 12px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand fw-bold"><i class="fas fa-chart-line me-2"></i>HİSSEMATİK <span class="text-primary">PRO</span></span>
        <button id="update-btn" class="btn btn-primary px-4 fw-bold">
            <i class="fas fa-sync-alt me-2"></i> VERİLERİ GÜNCELLE
        </button>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 text-muted small">
        <div class="col-12 d-flex justify-content-between">
            <span><i class="far fa-clock me-1"></i> Son Güncelleme: <span id="last-update">-</span></span>
            <span><i class="fas fa-circle text-success me-1" style="font-size: 8px;"></i> Sistem Aktif</span>
        </div>
    </div>

    <div id="hisse-listesi" class="row g-4">
        <div class="col-12 text-center py-5">
            <h4 class="text-muted">Başlamak için "Verileri Güncelle" butonuna basın.</h4>
            <p class="text-muted small">Cloudflare Worker üzerinden canlı veriler çekilecektir.</p>
        </div>
    </div>
</div>

<script type="module">
        // --- AYARLAR ---
        // Senin Worker linkini buraya tam olarak yapıştırdım
        const WORKER_URL = 'https://hissematik-proxy.serkanugur.workers.dev/'; 
        
        const state = {
            hisseler: ['THYAO', 'EREGL', 'ASELS', 'SISE', 'BIMAS', 'EKGYO'], // .IS takısını Worker ekliyor
            veriler: []
        };

        const ui = {
            render() {
                const container = document.getElementById('hisse-listesi');
                if (state.veriler.length === 0) return;

                container.innerHTML = state.veriler.map(h => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100 stock-card shadow-sm">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4 class="fw-bold mb-0">${h.symbol}</h4>
                                    <span class="badge ${h.rsi < 35 ? 'bg-success' : (h.rsi > 65 ? 'bg-danger' : 'bg-secondary')} p-2">
                                        ${h.rsi < 35 ? 'AL' : (h.rsi > 65 ? 'SAT' : 'TUT')}
                                    </span>
                                </div>
                                <div class="d-flex justify-content-between align-items-end mb-4">
                                    <div>
                                        <span class="h2 fw-bold mb-0">${h.price.toFixed(2)}</span>
                                        <span class="small text-muted">TL</span>
                                    </div>
                                    <div class="text-end fw-bold ${h.change >= 0 ? 'text-success' : 'text-danger'}">
                                        ${h.change >= 0 ? '▲' : '▼'} %${Math.abs(h.change).toFixed(2)}
                                    </div>
                                </div>
                                <div class="row g-2 mb-4 text-center">
                                    <div class="col-6"><div class="p-2 border rounded bg-light small text-muted">RSI (14)<br><b class="text-dark">${h.rsi.toFixed(1)}</b></div></div>
                                    <div class="col-6"><div class="p-2 border rounded bg-light small text-muted">DEĞİŞİM<br><b class="text-dark">%${h.change.toFixed(2)}</b></div></div>
                                </div>
                                <div class="ai-box p-3 rounded bg-dark text-light" style="font-size:0.85rem; border-left: 4px solid #0d6efd;">
                                    <i class="fas fa-robot text-info me-1"></i> <b>STRATEJİ:</b><br>
                                    ${h.rsi < 35 ? 'Aşırı satım bölgesinde. Tepki alımları gelebilir.' : (h.rsi > 65 ? 'Aşırı alım seviyesi. Kar satışı görülebilir.' : 'Nötr bölge. Mevcut trend korunuyor.')}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        };

        async function updateData() {
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            btn.innerHTML = 'Güncelleniyor...';

            try {
                // Senin Worker'ın beklediği format: ?semboller=THYAO,EREGL...
                const sembolListesi = state.hisseler.join(',');
                const response = await fetch(`${WORKER_URL}?semboller=${sembolListesi}`);
                const allData = await response.json();

                const tempVeriler = [];

                for (const s of state.hisseler) {
                    const stock = allData[s];
                    if (stock && stock.chart && stock.chart.result) {
                        const res = stock.chart.result[0];
                        const price = res.meta.regularMarketPrice;
                        const prevClose = res.meta.previousClose;
                        const closes = res.indicators.quote[0].close.filter(p => p != null);
                        
                        // Basit RSI Hesaplama
                        let rsi = 50;
                        if (closes.length > 14) {
                            let gains = 0, losses = 0;
                            for (let i = closes.length - 14; i < closes.length; i++) {
                                const diff = closes[i] - closes[i-1];
                                if (diff > 0) gains += diff; else losses -= diff;
                            }
                            rsi = 100 - (100 / (1 + (gains / losses)));
                        }

                        tempVeriler.push({
                            symbol: s,
                            price: price,
                            change: ((price - prevClose) / prevClose) * 100,
                            rsi: rsi
                        });
                    }
                }

                state.veriler = tempVeriler;
                ui.render();
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();

            } catch (err) {
                console.error("Hata:", err);
                alert("Veriler alınamadı. Worker linkini veya internetini kontrol et.");
            }

            btn.disabled = false;
            btn.innerHTML = 'VERİLERİ GÜNCELLE';
        }

        document.getElementById('update-btn').addEventListener('click', updateData);
    </script>
</body>
</html>
