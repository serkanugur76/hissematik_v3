<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HisseMatik Pro | Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7fa; --card: #ffffff; --dark: #1a1d21; --primary: #0d6efd; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #2d3436; }
        .navbar { background-color: var(--dark) !important; border-bottom: 3px solid var(--primary); }
        .stock-card { border: none; border-radius: 16px; transition: all 0.3s ease; background: var(--card); }
        .stock-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .ai-box { background: var(--dark); color: #adbac7; border-radius: 12px; padding: 15px; border-left: 5px solid var(--primary); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand fw-bold"><i class="fas fa-chart-line me-2"></i>HİSSEMATİK <span class="text-primary">PRO</span></span>
        <button id="update-btn" class="btn btn-primary px-4 fw-bold">
            <i class="fas fa-sync-alt me-2"></i> VERİLERİ GÜNCELLE
        </button>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 text-muted small">
        <div class="col-12 d-flex justify-content-between">
            <span><i class="far fa-clock me-1"></i> Son Güncelleme: <span id="last-update">-</span></span>
            <span><i class="fas fa-circle text-success me-1" style="font-size: 8px;"></i> Sistem Aktif</span>
        </div>
    </div>
    <div id="hisse-listesi" class="row g-4">
        </div>
</div>

<script>
    // SENİN ÇALIŞAN WORKER LİNKİN
    const WORKER_URL = 'https://hissematik-proxy.serkanugur.workers.dev/'; 
    
    // İzlenecek hisse listesi
    const hisseler = ['THYAO', 'EREGL', 'ASELS', 'SISE', 'BIMAS', 'EKGYO'];

    async function verileriGetir() {
        const btn = document.getElementById('update-btn');
        const container = document.getElementById('hisse-listesi');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>GÜNCELLENİYOR...';
        container.innerHTML = ''; // Eski kartları temizle

        for (let s of hisseler) {
            try {
                // Worker'a symbol parametresi ile istek atıyoruz
                const response = await fetch(`${WORKER_URL}?symbol=${s}`);
                const d = await response.json();

                if (d.error) throw new Error(d.error);

                // Kart tasarımını ekrana basıyoruz
                container.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 stock-card shadow-sm p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="fw-bold mb-0">${s}</h4>
                            <span class="badge ${d.rsi < 35 ? 'bg-success' : (d.rsi > 65 ? 'bg-danger' : 'bg-secondary')} p-2">
                                ${d.rsi < 35 ? 'AL' : (d.rsi > 65 ? 'SAT' : 'TUT')}
                            </span>
                        </div>
                        <div class="d-flex justify-content-between align-items-end mb-4">
                            <div>
                                <span class="h2 fw-bold mb-0">${d.price.toFixed(2)}</span>
                                <span class="small text-muted">TL</span>
                            </div>
                            <div class="text-end fw-bold ${d.change >= 0 ? 'text-success' : 'text-danger'}">
                                ${d.change >= 0 ? '▲' : '▼'} %${Math.abs(d.change).toFixed(2)}
                            </div>
                        </div>
                        <div class="row g-2 mb-4 text-center">
                            <div class="col-6"><div class="p-2 border rounded bg-light small text-muted">RSI (14)<br><b class="text-dark">${d.rsi.toFixed(1)}</b></div></div>
                            <div class="col-6"><div class="p-2 border rounded bg-light small text-muted">MACD<br><b class="text-dark">Sinyal Bekleniyor</b></div></div>
                        </div>
                        <div class="ai-box">
                            <div class="d-flex align-items-center mb-2">
                                <i class="fas fa-robot text-info me-2"></i>
                                <span class="small fw-bold text-info">AI STRATEJİ ANALİZİ</span>
                            </div>
                            <p class="small mb-0 opacity-75">
                                ${d.rsi < 35 ? 'Hisse aşırı satım bölgesinde, teknik bir tepki yükselişi gelebilir.' : 
                                  d.rsi > 65 ? 'Hisse aşırı alım bölgesinde, kar satışlarına karşı dikkatli olunmalı.' : 
                                  'Teknik göstergeler nötr bölgede. Yatay seyir korunabilir.'}
                            </p>
                        </div>
                    </div>
                </div>`;

            } catch (err) {
                console.error(s + " hatası:", err);
            }
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i> VERİLERİ GÜNCELLE';
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
    }

    // Butona basınca çalıştır
    document.getElementById('update-btn').addEventListener('click', verileriGetir);
    
    // Sayfa açılınca otomatik bir kere çalıştır
    window.onload = verileriGetir;
</script>

</body>
</html>
