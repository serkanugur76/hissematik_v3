<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HisseMatik Pro Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .stock-card { border: none; border-radius: 15px; transition: 0.3s; background: white; }
        .stock-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .ai-box { background: #1a1d21; color: #adbac7; border-radius: 10px; padding: 12px; border-left: 4px solid #3498db; }
        .indicator { background: #f8f9fa; border-radius: 8px; padding: 8px; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="fas fa-chart-pie me-2"></i>HİSSEMATİK PRO</span>
            <button id="update-btn" class="btn btn-primary btn-sm">Güncelle</button>
        </div>
    </nav>
    <div class="container">
        <div id="hisse-listesi" class="row g-4">
            <div class="col-12 text-center p-5 text-muted">Verileri yüklemek için "Güncelle" butonuna basın.</div>
        </div>
    </div>

    <script type="module">
        // Tüm mantığı buraya topladım ki dosya yolu hatası yaşama
        const state = {
            hisseler: ['THYAO.IS', 'EREGL.IS', 'ASELS.IS', 'SISE.IS', 'BIMAS.IS'],
            veriler: []
        };

        const ui = {
            render() {
                const container = document.getElementById('hisse-listesi');
                container.innerHTML = state.veriler.map(h => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100 stock-card shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4 class="mb-0 fw-bold">${h.symbol}</h4>
                                    <span class="badge ${h.rsi < 35 ? 'bg-success' : (h.rsi > 65 ? 'bg-danger' : 'bg-secondary')}">${h.rsi < 35 ? 'AL' : (h.rsi > 65 ? 'SAT' : 'TUT')}</span>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="h3 mb-0">${h.price.toFixed(2)} TL</span>
                                    <span class="fw-bold ${h.change >= 0 ? 'text-success' : 'text-danger'}">${h.change >= 0 ? '▲' : '▼'} %${Math.abs(h.change).toFixed(2)}</span>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-6"><div class="indicator"><small class="text-muted d-block">RSI</small><b>${h.rsi.toFixed(2)}</b></div></div>
                                    <div class="col-6"><div class="indicator"><small class="text-muted d-block">MACD</small><b>${h.macd.toFixed(2)}</b></div></div>
                                </div>
                                <div class="ai-box">
                                    <small class="text-info fw-bold"><i class="fas fa-robot"></i> AI ANALİZ</small>
                                    <p class="small mb-0 mt-1">${h.symbol} için teknik göstergeler ${h.rsi < 40 ? 'pozitif' : 'nötr'} bir seyir izliyor. Destek seviyeleri takip edilmeli.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        };

        document.getElementById('update-btn').addEventListener('click', async () => {
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            btn.innerHTML = 'Yükleniyor...';
            
            // Simüle edilmiş veri (Buraya api.js fonksiyonunu bağlayacağız)
            state.veriler = state.hisseler.map(s => ({
                symbol: s, price: Math.random() * 100 + 50, change: (Math.random() * 4) - 2, rsi: Math.random() * 50 + 25, macd: Math.random() * 2 - 1
            }));

            ui.render();
            btn.disabled = false;
            btn.innerHTML = 'Güncelle';
        });
    </script>
</body>
</html>
