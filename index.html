<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HisseMatik Pro | Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7fa; --card: #ffffff; --dark: #1a1d21; --primary: #0d6efd; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #2d3436; }
        .navbar { background-color: var(--dark) !important; border-bottom: 3px solid var(--primary); }
        .stock-card { border: none; border-radius: 16px; transition: all 0.3s ease; background: var(--card); }
        .stock-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .indicator-badge { background: #f8f9fb; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #eee; }
        .ai-box { background: var(--dark); color: #adbac7; border-radius: 12px; padding: 15px; border-left: 5px solid var(--primary); }
        .signal-badge { font-size: 0.8rem; padding: 6px 12px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand fw-bold"><i class="fas fa-chart-line me-2"></i>HİSSEMATİK <span class="text-primary">PRO</span></span>
        <button id="update-btn" class="btn btn-primary px-4 fw-bold">
            <i class="fas fa-sync-alt me-2"></i> VERİLERİ GÜNCELLE
        </button>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 text-muted small">
        <div class="col-12 d-flex justify-content-between">
            <span><i class="far fa-clock me-1"></i> Son Güncelleme: <span id="last-update">-</span></span>
            <span><i class="fas fa-circle text-success me-1" style="font-size: 8px;"></i> Sistem Aktif</span>
        </div>
    </div>

    <div id="hisse-listesi" class="row g-4">
        <div class="col-12 text-center py-5">
            <h4 class="text-muted">Başlamak için "Verileri Güncelle" butonuna basın.</h4>
            <p class="text-muted small">Cloudflare Worker üzerinden canlı veriler çekilecektir.</p>
        </div>
    </div>
</div>

<script type="module">
    // --- KONTROL PANELİ ---
    // BURAYA CLOUDFLARE WORKER LINKINI YAPIŞTIR
    const WORKER_URL = 'https://hissematik-proxy.serkanugur.workers.dev/'; 
    
    const state = {
        hisseler: ['THYAO.IS', 'EREGL.IS', 'ASELS.IS', 'SISE.IS', 'BIMAS.IS', 'EKGYO.IS'],
        veriler: []
    };

    const ui = {
        render() {
            const container = document.getElementById('hisse-listesi');
            if (state.veriler.length === 0) return;

            container.innerHTML = state.veriler.map(h => {
                // Sinyal Rengi Belirleme
                let signalColor = 'bg-secondary';
                if (h.rsi < 35) signalColor = 'bg-success';
                else if (h.rsi > 65) signalColor = 'bg-danger';

                return `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 stock-card shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h4 class="fw-bold mb-0">${h.symbol}</h4>
                                <span class="badge signal-badge ${signalColor}">${h.rsi < 35 ? 'AL' : (h.rsi > 65 ? 'SAT' : 'TUT')}</span>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-end mb-4">
                                <div>
                                    <span class="h2 fw-bold mb-0">${h.price.toFixed(2)}</span>
                                    <span class="small text-muted">TL</span>
                                </div>
                                <div class="text-end">
                                    <span class="fw-bold ${h.change >= 0 ? 'text-success' : 'text-danger'}">
                                        ${h.change >= 0 ? '▲' : '▼'} %${Math.abs(h.change).toFixed(2)}
                                    </span>
                                </div>
                            </div>

                            <div class="row g-2 mb-4">
                                <div class="col-6">
                                    <div class="indicator-badge">
                                        <small class="text-muted d-block">RSI (14)</small>
                                        <span class="fw-bold">${h.rsi.toFixed(1)}</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="indicator-badge">
                                        <small class="text-muted d-block">MACD</small>
                                        <span class="fw-bold text-primary">${h.macd.toFixed(2)}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="ai-box">
                                <div class="d-flex align-items-center mb-2">
                                    <i class="fas fa-robot text-info me-2"></i>
                                    <span class="small fw-bold text-info">AI STRATEJİ ANALİZİ</span>
                                </div>
                                <p class="small mb-0 opacity-75" style="line-height: 1.4;">
                                    ${this.generateAINote(h)}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        },

        generateAINote(h) {
            if (h.rsi < 35) return `${h.symbol} aşırı satım bölgesinde. RSI verisi dip seviyelerden dönüş sinyali veriyor olabilir. Kademeli alım düşünülebilir.`;
            if (h.rsi > 65) return `${h.symbol} aşırı alım bölgesine girmiş durumda. RSI şişkinlik gösteriyor, kar satışlarına karşı temkinli olunmalı.`;
            if (h.change > 2) return `Kuvvetli yükseliş trendi izleniyor. Momentum pozitif ancak direnç seviyelerine dikkat edilmeli.`;
            return `Yatay seyir hakim. Teknik göstergeler nötr bölgede kalmaya devam ediyor. Belirgin bir trend oluşumu beklenmeli.`;
        }
    };

    async function startUpdate() {
        const btn = document.getElementById('update-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>GÜNCELLENİYOR...';

        const fetchedData = [];

        for (const s of state.hisseler) {
            try {
                const response = await fetch(`${WORKER_URL}?symbol=${s}`);
                if (response.ok) {
                    const d = await response.json();
                    fetchedData.push({
                        symbol: s,
                        price: d.price || 0,
                        change: d.changePercent || 0,
                        rsi: d.rsi || 50,
                        macd: d.macd || 0
                    });
                }
            } catch (err) {
                console.error(s + " Hatası:", err);
            }
        }

        state.veriler = fetchedData;
        ui.render();
        
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i> VERİLERİ GÜNCELLE';
    }

    document.getElementById('update-btn').addEventListener('click', startUpdate);
</script>

</body>
</html>
