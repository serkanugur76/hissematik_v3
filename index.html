<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HisseMatik Pro | Canlı Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7fa; --card: #ffffff; --dark: #1a1d21; --primary: #0d6efd; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: var(--dark) !important; border-bottom: 3px solid var(--primary); }
        .stock-card { border: none; border-radius: 16px; transition: 0.3s; background: var(--card); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .ai-box { background: #1e2227; color: #adbac7; border-radius: 12px; padding: 15px; border-left: 5px solid var(--primary); font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand fw-bold"><i class="fas fa-chart-line me-2"></i>HİSSEMATİK PRO</span>
        <button id="update-btn" class="btn btn-primary px-4 fw-bold" onclick="verileriGuncelle()">
            <i class="fas fa-sync-alt me-2"></i> VERİLERİ GÜNCELLE
        </button>
    </div>
</nav>

<div class="container">
    <div id="hisse-listesi" class="row g-4">
        <div class="text-center mt-5">Veriler bekleniyor...</div>
    </div>
</div>

<script>
    const WORKER_URL = 'https://hissematik-proxy.ugurserkan.workers.dev/'; 
    const hisseler = ['THYAO', 'EREGL', 'ASELS', 'SISE', 'BIMAS', 'EKGYO'];

    async function verileriGuncelle() {
        const container = document.getElementById('hisse-listesi');
        const btn = document.getElementById('update-btn');
        btn.disabled = true;
        btn.innerHTML = 'Yükleniyor...';

        let html = '';

        for (let s of hisseler) {
            try {
                // Senin worker yapına göre (semboller=...) istek atıyoruz
                const response = await fetch(`${WORKER_URL}?semboller=${s}`);
                const data = await response.json();

                // Gönderdiğin JSON yapısını burada parçalıyoruz
                if (data[s] && data[s].chart && data[s].chart.result) {
                    const res = data[s].chart.result[0];
                    const price = res.meta.regularMarketPrice;
                    const prevClose = res.meta.chartPreviousClose;
                    const change = ((price - prevClose) / prevClose) * 100;
                    
                    // RSI için kapanış fiyatlarını al
                    const closes = res.indicators.quote[0].close.filter(c => c != null);
                    let rsi = 50; 
                    if (closes.length > 14) {
                        let g = 0, l = 0;
                        for (let i = closes.length - 14; i < closes.length; i++) {
                            let d = closes[i] - closes[i-1];
                            d > 0 ? g += d : l -= d;
                        }
                        rsi = 100 - (100 / (1 + (g / (l || 1))));
                    }

                    html += `
                    <div class="col-md-4">
                        <div class="card stock-card p-4">
                            <h4 class="fw-bold">${s}</h4>
                            <h2 class="fw-bold">${price.toFixed(2)} TL</h2>
                            <div class="fw-bold ${change >= 0 ? 'text-success' : 'text-danger'}">
                                ${change >= 0 ? '▲' : '▼'} %${Math.abs(change).toFixed(2)}
                            </div>
                            <div class="mt-3 small border-top pt-2">
                                RSI: <b>${rsi.toFixed(1)}</b> | Durum: <b>${rsi < 35 ? 'AL' : (rsi > 65 ? 'SAT' : 'TUT')}</b>
                            </div>
                            <div class="ai-box mt-3">
                                <i class="fas fa-robot text-info"></i> ${rsi < 35 ? 'Teknik dipte, alıcılar güçlenebilir.' : (rsi > 65 ? 'Doygunluk noktasında, dikkat!' : 'Nötr bölge, yatay seyir.')}
                            </div>
                        </div>
                    </div>`;
                }
            } catch (e) { console.error(s + " hatası:", e); }
        }

        container.innerHTML = html;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i> VERİLERİ GÜNCELLE';
    }

    window.onload = verileriGuncelle;
</script>
</body>
</html>
