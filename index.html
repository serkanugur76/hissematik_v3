<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HisseMatik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">HİSSEMATİK TEST</span>
            <button onclick="testEt()" class="btn btn-primary">VERİLERİ ÇEK</button>
        </div>
    </nav>

    <div class="container">
        <div id="sonuc" class="row g-3">
            <p class="text-center">Butona basarak testi başlatın.</p>
        </div>
    </div>

    <script>
        async function testEt() {
            const res = await fetch('https://hissematik-proxy.ugurserkan.workers.dev/?symbol=THYAO');
            const data = await res.json();
            const container = document.getElementById('sonuc');
            
            // Eğer data.price varsa kartı bas, yoksa hatayı bas
            if(data.price) {
                container.innerHTML = `
                <div class="col-md-4">
                    <div class="card p-4 shadow-sm">
                        <h3>THYAO</h3>
                        <h2 class="text-primary">${data.price.toFixed(2)} TL</h2>
                        <p>RSI: ${data.rsi ? data.rsi.toFixed(2) : 'Hesaplanamadı'}</p>
                    </div>
                </div>`;
            } else {
                container.innerHTML = `<div class="alert alert-danger">Worker çalışıyor ama Yahoo veri göndermiyor: ${JSON.stringify(data)}</div>`;
            }
        }
    </script>
</body>
</html>
